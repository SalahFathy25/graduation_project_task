name: graduation_project
description: "Saudi Travel Planner - Graduation Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0

  # Storage
  flutter_secure_storage: ^10.0.0

  # Utilities
  flutter_svg: ^2.2.4
  intl: ^0.20.2
  google_fonts: ^8.0.2
  equatable: ^2.0.8
  google_maps_flutter: ^2.17.0
  flutter_map: ^8.2.2
  flutter_map_cache: ^2.0.2
  path_provider: ^2.1.5
  dio: ^5.7.0
  geolocator: ^13.0.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1

flutter:
  generate: true # Add this for localization
  uses-material-design: true
