  flutter_svg: ^2.2.3
  intl: ^0.20.2
  google_fonts: ^8.0.2
  equatable: ^2.0.8
  google_maps_flutter: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1

flutter:
  generate: true # Add this for localization
  uses-material-design: true
